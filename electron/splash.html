<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>итд.app Launcher</title>
    <style>
        :root {
            --accent: #2AABEE; 
            --accent-glow: rgba(42, 171, 238, 0.6);
            --bg-deep: #050505;
            --text-main: #ffffff;
            --text-muted: #8899a6;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-deep); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh; width: 100vw; overflow: hidden; display: flex; user-select: none;
            -webkit-app-region: drag; position: relative;
        }

        .ambient-blobs { position: absolute; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .blob { position: absolute; filter: blur(50px); border-radius: 50%; opacity: 0.5; animation: floatBlob 10s infinite alternate ease-in-out; }
        .blob1 { width: 250px; height: 250px; background: var(--accent); top: -80px; left: -80px; }
        .blob2 { width: 200px; height: 200px; background: rgba(121, 75, 196, 0.8); bottom: -50px; right: -50px; animation-delay: -3s; }
        .blob3 { width: 180px; height: 180px; background: var(--accent-glow); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -5s; }

        .glass-overlay { position: absolute; inset: 0; background: rgba(10, 12, 16, 0.65); backdrop-filter: blur(30px); z-index: 1; border: 1px solid rgba(255, 255, 255, 0.05); }

        .content-wrapper { position: relative; z-index: 2; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 50px 24px 30px; box-sizing: border-box; }

        .center-stage { display: flex; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; transition: transform 0.15s ease-out; }
        .logo-wrapper { position: relative; width: 90px; height: 90px; margin-bottom: 20px; filter: drop-shadow(0 10px 30px var(--accent-glow)); animation: floatLogo 4s infinite ease-in-out; }
        .logo-img { width: 100%; height: 100%; object-fit: contain; }

        .user-avatar {
            width: 90px; height: 90px; border-radius: 50%; border: 3px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px var(--accent-glow); display: none; align-items: center; justify-content: center;
            font-size: 48px; line-height: 1; overflow: hidden; margin-bottom: 20px; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .user-avatar-img { width: 100%; height: 100%; object-fit: cover; }

        .app-name { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; text-align: center; text-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); }

        .bottom-stage { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .status-text { font-size: 13px; color: var(--text-muted); font-weight: 600; margin-bottom: 16px; }
        .progress-container { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.08); border-radius: 6px; overflow: hidden; margin-bottom: 16px; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 15px var(--accent-glow); transition: width 0.4s ease; }

        @keyframes floatBlob { 0% { transform: translate(0, 0); } 100% { transform: translate(20px, 30px); } }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes popIn { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div class="ambient-blobs"><div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div></div>
    <div class="glass-overlay"></div>
    <div class="content-wrapper">
        <div class="center-stage" id="parallax-target">
            <div class="logo-wrapper" id="logo-wrap">
                <img src="../public/etc.app.png" alt="logo" class="logo-img" />
            </div>
            <div id="user-avatar" class="user-avatar"></div>
            <div class="app-name" id="app-title"></div>
        </div>
        <div class="bottom-stage">
            <div class="status-text" id="status">Загрузка...</div>
            <div class="progress-container"><div class="progress-fill" id="progress"></div></div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        function resetToDefault() {
            document.getElementById('logo-wrap').style.display = 'block';
            document.getElementById('user-avatar').style.display = 'none';
            document.getElementById('app-title').innerText = 'итд.app';
            localStorage.removeItem('nowkie_user'); 
        }

        async function initSplash() {
            try {
                
                const activeUser = await ipcRenderer.invoke('app:get-stored-user');
                
                if (activeUser) {
                    document.getElementById('logo-wrap').style.display = 'none';
                    const av = document.getElementById('user-avatar');
                    av.style.display = 'flex';

                    if (activeUser.avatar && activeUser.avatar.startsWith('http')) {
                        av.innerHTML = `<img src="${activeUser.avatar}" class="user-avatar-img">`;
                    } else {
                        av.textContent = activeUser.avatar || '👤';
                    }
                    
                    const name = activeUser.displayName || activeUser.username;
                    document.getElementById('app-title').innerText = `С возвращением, ${name.split(' ')[0]}`;
                } else {
                    resetToDefault();
                }
            } catch (e) {
                resetToDefault();
            }

            
            const accent = localStorage.getItem('nowkie_accent');
            if (accent) document.documentElement.style.setProperty('--accent', accent);
        }

        initSplash();

        ipcRenderer.on('updater-state', (event, data) => {
            if (data.status) document.getElementById('status').innerText = data.details || data.status;
            if (data.progress) document.getElementById('progress').style.width = data.progress + '%';
        });

        document.addEventListener('mousemove', (e) => {
            const target = document.getElementById('parallax-target');
            target.style.transform = `translate(${(window.innerWidth/2 - e.clientX)/35}px, ${(window.innerHeight/2 - e.clientY)/35}px)`;
        });
    </script>
</body>
</html>
